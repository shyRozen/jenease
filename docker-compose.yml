services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "127.0.0.1:8080:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - backend
    restart: unless-stopped
